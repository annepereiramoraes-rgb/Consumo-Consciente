<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Tabuleiro - Trilha do Consumo Consciente</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #7ec855 0%, #b3e075 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            color: #2c3e50;
        }
        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #f7fff7;
            font-size: 16px;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .game-container {
            display: flex;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        /* Painel Lateral */
        .controls {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            text-align: center;
            width: 260px;
            box-sizing: border-box;
        }
        .btn {
            background-color: #ff5964;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #d9414c;
            transition: all 0.1s ease;
            width: 100%;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #d9414c;
        }
        .btn:disabled {
            background-color: #bdc3c7;
            box-shadow: 0 5px 0 #95a5a6;
            cursor: not-allowed;
        }
        .dice {
            font-size: 64px;
            margin: 15px 0;
            user-select: none;
        }
        /* Tabuleiro Estilo Imagem */
        .board-wrapper {
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.4);
        }
        .board-track {
            display: flex;
            flex-wrap: wrap;
            max-width: 720px;
            gap: 15px;
            justify-content: center;
            position: relative;
        }

        .space {
            width: 75px;
            height: 75px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            box-shadow: 0 5px 0 rgba(0,0,0,0.15), inset 0 -4px 0 rgba(0,0,0,0.2);
            position: relative;
            box-sizing: border-box;
        }
        /* Cores alternadas baseadas na imagem */
        .c-pink { background-color: #e43f6f; }
        .c-green { background-color: #3caea3; }
        .c-blue { background-color: #20639b; }
        .c-purple { background-color: #a77ca7; }
        .c-orange { background-color: #f6d55c; color: #333; text-shadow: none; }
        .c-yellow { background-color: #f68945; }

        /* Casas especiais de início e fim circulares (Alvos) */
        .space.start {
            background: radial-gradient(circle, #7ec855 30%, #2c3e50 31%, #7ec855 50%, #2c3e50 51%, #7ec855 70%);
            border-radius: 50%;
            border: 4px solid white;
            width: 85px;
            height: 85px;
        }
        .space.end {
            background: radial-gradient(circle, #e43f6f 30%, #2c3e50 31%, #e43f6f 50%, #2c3e50 51%, #e43f6f 70%);
            border-radius: 50%;
            border: 4px solid white;
            width: 85px;
            height: 85px;
        }

        /* Peão do Jogador */
        .player {
            width: 32px;
            height: 32px;
            background-color: #ffffff;
            border: 4px solid #2c3e50;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease-in-out;
        }
        .player::after {
            content: '';
            display: block;
            width: 10px;
            height: 10px;
            background: #2c3e50;
            border-radius: 50%;
            margin: 7px auto;
        }

        /* Janela Modal de Pergunta */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 24px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .modal h2 { margin-top: 0; color: #20639b; font-size: 24px; }
        #question-text { font-size: 18px; margin-bottom: 25px; line-height: 1.5; font-weight: 500; }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .opt-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            font-weight: 600;
            color: #495057;
            transition: all 0.2s ease;
        }
        .opt-btn:hover {
            background: #e8f4fd;
            border-color: #3caea3;
            color: #20639b;
        }
        #status { font-weight: bold; margin-top: 15px; font-size: 16px; min-height: 40px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <h1>Trilha do Consumo Consciente</h1>
    <div class="subtitle">Chegue até o final respondendo aos desafios práticos!</div>

    <div class="game-container">
        <div class="board-wrapper">
            <div class="board-track" id="board-track"></div>
        </div>

        <div class="controls">
            <h2>Sua Jornada</h2>
            <div class="dice" id="dice-view">⚀</div>
            <button class="btn" id="roll-btn" onclick="rollDice()">Girar Dado</button>
            <p id="status" style="color: #2c3e50; text-shadow: none;">Clique no botão para rolar o dado!</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <p style="font-size: 18px; margin: 0;"><strong>Pontuação:</strong> <span id="score" style="color:#e43f6f; font-weight:bold;">0</span></p>
        </div>
    </div>

    <div class="modal" id="quiz-modal">
        <div class="modal-content">
            <h2>Desafio de Consumo!</h2>
            <p id="question-text">Carregando pergunta...</p>
            <div class="options-list" id="options-container"></div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "O que significa consumo consciente?", o: ["Comprar tudo o que está em promoção.", "Consumir de forma responsável, considerando impactos financeiros, sociais e ambientais.", "Comprar apenas produtos importados.", "Evitar qualquer tipo de consumo."], a: 1 },
            { q: "Antes de fazer uma compra, uma atitude de consumo consciente é:", o: ["Comprar imediatamente para não perder a oportunidade.", "Perguntar aos amigos se eles gostaram do produto.", "Avaliar se o produto é realmente necessário.", "Comprar o item mais caro disponível."], a: 2 },
            { q: "Qual das opções representa uma necessidade e não um desejo?", o: ["Trocar de celular porque saiu um modelo novo.", "Comprar roupas de marca para seguir uma tendência.", "Adquirir material escolar para estudar.", "Comprar um videogame recém-lançado."], a: 2 },
            { q: "O que é um orçamento pessoal?", o: ["Uma lista de sonhos de consumo.", "Um registro das receitas e despesas de uma pessoa.", "Um cartão de crédito sem limite.", "Uma conta bancária."], a: 1 },
            { q: "Qual atitude ajuda a evitar compras impulsivas?", o: ["Comprar sempre que sentir vontade.", "Usar o limite máximo do cartão de crédito.", "Esperar um tempo antes de decidir pela compra.", "Ignorar o preço do produto."], a: 2 },
            { q: "Ao comparar preços antes de comprar um produto, você está:", o: ["Perdendo tempo.", "Praticando educação financeira.", "Aumentando seus gastos.", "Evitando economizar."], a: 1 },
            { q: "O que pode acontecer quando uma pessoa gasta mais do que ganha regularmente?", o: ["Acumula economias.", "Melhora sua situação financeira.", "Pode entrar em endividamento.", "Recebe recompensas do banco."], a: 2 },
            { q: "Qual é uma vantagem de reutilizar objetos sempre que possível?", o: ["Aumentar o desperdício.", "Economizar dinheiro e reduzir impactos ambientais.", "Comprar mais produtos novos.", "Gastando mais recursos naturais."], a: 1 },
            { q: "Uma propaganda influencia o consumo porque:", o: ["Pode despertar desejos de compra, mesmo sem necessidade real.", "Obriga as pessoas a comprar.", "Define o preço dos produtos.", "Substitui o planejamento financeiro."], a: 0 },
            { q: "Se um estudante recebe R$ 100 por mês e decide guardar R$ 20, qual porcentagem da renda ele está economizando?", o: ["10%", "15%", "20%", "25%"], a: 2 },
            { q: "Qual dos 3R's da sustentabilidade foca em diminuir a quantidade de lixo gerada antes mesmo de comprar?", o: ["Reciclar.", "Reduzir.", "Reutilizar.", "Reparar."], a: 1 },
            { q: "O que é a 'Obsolescência Programada'?", o: ["O ato de planejar compras com antecedência.", "Fabricar produtos feitos para durar pouco, forçando o consumidor a comprar novos.", "Uso de inteligência artificial em lojas.", "Venda de produtos de segunda mão."], a: 1 },
            { q: "A Reserva de Emergência serve principalmente para:", o: ["Comprar pacotes de viagens inesperados de última hora.", "Garantir segurança financeira em imprevistos, como problemas de saúde.", "Investir na bolsa de valores arriscando tudo.", "Gastar em festas de fim de ano."], a: 1 },
            { q: "Consumir produtos produzidos localmente por pequenos produtores ajuda a:", o: ["Encarecer o frete global.", "Fortalecer a economia local e reduzir a pegada de carbono do transporte.", "Prejudicar grandes marcas internacionais.", "Diminuir a variedade de comida saudável."], a: 1 },
            { q: "Qual o melhor hábito para lidar com o uso do cartão de crédito?", o: ["Pagar apenas o valor mínimo da fatura todos os meses.", "Achar que o limite é um dinheiro extra da sua renda.", "Controlar os gastos e pagar o valor total da fatura na data certa.", "Emprestar para qualquer conhecido usar."], a: 2 }
        ];

        const colors = ['c-pink', 'c-green', 'c-blue', 'c-purple', 'c-orange', 'c-yellow'];
        const totalSpaces = 25;
        let playerPosition = 0;
        let score = 0;
        const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        function buildBoard() {
            const trackEl = document.getElementById('board-track');
            trackEl.innerHTML = '';

            for (let i = 0; i < totalSpaces; i++) {
                const space = document.createElement('div');
                if (i === 0) {
                    space.className = 'space start';
                    space.innerText = 'Início';
                } else if (i === totalSpaces - 1) {
                    space.className = 'space end';
                    space.innerText = 'Fim';
                } else {
                    const colorClass = colors[i % colors.length];
                    space.className = `space ${colorClass}`;
                    space.innerText = i;
                }
                space.setAttribute('id', `space-${i}`);
                trackEl.appendChild(space);
            }
            placePlayer();
        }

        function placePlayer() {
            const oldPlayer = document.querySelector('.player');
            if (oldPlayer) oldPlayer.remove();

            const currentSpace = document.getElementById(`space-${playerPosition}`);
            if (currentSpace) {
                const playerMarker = document.createElement('div');
                playerMarker.className = 'player';
                currentSpace.appendChild(playerMarker);
            }
            document.getElementById('score').innerText = score;
        }

        function rollDice() {
            document.getElementById('roll-btn').disabled = true;
            let counter = 0;
            
            const interval = setInterval(() => {
                const rand = Math.floor(Math.random() * 6);
                document.getElementById('dice-view').innerText = diceFaces[rand];
                counter++;
                
                if (counter > 10) {
                    clearInterval(interval);
                    const steps = Math.floor(Math.random() * 6) + 1;
                    document.getElementById('dice-view').innerText = diceFaces[steps - 1];
                    
                    document.getElementById('status').innerText = `O dado marcou: ${steps}! Movendo o peão...`;
                    // Inicia a caminhada passo a passo
                    moveStepByStep(steps);
                }
            }, 80);
        }

        // FUNÇÃO ATUALIZADA: Move o bonequinho de 1 em 1 casa lentamente
        function moveStepByStep(stepsLeft) {
            if (stepsLeft <= 0 || playerPosition >= totalSpaces - 1) {
                // Chegou ao destino final do movimento
                if (playerPosition >= totalSpaces - 1) {
                    playerPosition = totalSpaces - 1;
                    placePlayer();
                    document.getElementById('status').innerText = "Parabéns! Você concluiu a trilha do consumo consciente!";
                    alert("Você completou o circuito! Parabéns por ser um consumidor consciente.");
                } else {
                    // Abre a pergunta quando parar na casa certa
                    setTimeout(() => { openQuiz(); }, 400);
                }
                return;
            }

            // Avança uma casa
            playerPosition++;
            placePlayer();

            // Espera 250 milissegundos antes de ir para a próxima casa
            setTimeout(() => {
                moveStepByStep(stepsLeft - 1);
            }, 250);
        }

        function openQuiz() {
            const randomIndex = Math.floor(Math.random() * quizData.length);
            const quiz = quizData[randomIndex];
            
            document.getElementById('question-text').innerText = quiz.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            container.setAttribute('data-correct', quiz.a);

            quiz.o.forEach((option, idx) => {
                const button = document.createElement('button');
                button.className = 'opt-btn';
                button.innerText = option;
                button.onclick = () => checkAnswer(idx);
                container.appendChild(button);
            });

            document.getElementById('quiz-modal').style.display = 'flex';
        }

        function checkAnswer(selectedIndex) {
            document.getElementById('quiz-modal').style.display = 'none';
            const container = document.getElementById('options-container');
            const correctAnswerIndex = parseInt(container.getAttribute('data-correct'), 10);
            const statusEl = document.getElementById('status');

            if (selectedIndex === correctAnswerIndex) {
                score += 15;
                statusEl.innerText = "Acertou! Excelente hábito de consumo! (+15 pontos)";
            } else {
                score = Math.max(0, score - 5);
                statusEl.innerText = "Ops! Cuidado com o desperdício ou gastos excessivos. (-5 pontos)";
            }

            document.getElementById('roll-btn').disabled = false;
            placePlayer();
        }

        buildBoard();
    </script>
</body>
</html>
